<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Globe -->
  <circle cx="24" cy="24" r="18" fill="url(#globe-gradient)" opacity="0.15"/>
  <circle cx="24" cy="24" r="18" stroke="url(#globe-gradient)" stroke-width="2"/>
  <!-- Latitude lines -->
  <ellipse cx="24" cy="24" rx="10" ry="18" stroke="url(#globe-gradient)" stroke-width="1.5" opacity="0.6"/>
  <line x1="6" y1="24" x2="42" y2="24" stroke="url(#globe-gradient)" stroke-width="1.5" opacity="0.6"/>
  <path d="M10 16 Q24 20 38 16" stroke="url(#globe-gradient)" stroke-width="1.5" opacity="0.5" fill="none"/>
  <path d="M10 32 Q24 28 38 32" stroke="url(#globe-gradient)" stroke-width="1.5" opacity="0.5" fill="none"/>
  <!-- Pulse dot center -->
  <circle cx="24" cy="24" r="4" fill="#2563eb"/>
  <!-- Ping rings -->
  <circle cx="24" cy="24" r="7" stroke="#22c55e" stroke-width="1.8" opacity="0.6"/>
  <circle cx="24" cy="24" r="11" stroke="#22c55e" stroke-width="1.2" opacity="0.3"/>
  <defs>
    <linearGradient id="globe-gradient" x1="6" y1="6" x2="42" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
</svg>
